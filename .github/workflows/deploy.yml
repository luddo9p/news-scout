name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Debug SSH connection
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          echo "Testing SSH connectivity..."
          sudo apt-get install -y sshpass
          echo "VPS_HOST length: $(echo -n "${{ secrets.VPS_HOST }}" | wc -c)"
          echo "VPS_USER length: $(echo -n "${{ secrets.VPS_USER }}" | wc -c)"
          echo "VPS_PASSWORD length: $(echo -n "$VPS_PASSWORD" | wc -c)"
          echo "Attempting SSH connection..."
          sshpass -p "$VPS_PASSWORD" ssh -v -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo 'SSH connection successful'"